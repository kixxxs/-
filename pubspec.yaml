name: photo_pdf_app
description: 拍照自动生成PDF - 支持标注编辑、本地保存和微信分享
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0
  pdf: ^3.11.0
  image: ^4.2.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  provider: ^6.1.0
  photo_view: ^0.15.0
  reorderables: ^0.6.0
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
